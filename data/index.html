<!DOCTYPE HTML>
<html>
<head>
    <title>ESP32 LED Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>ESP32 LED Control</h1>

    <p>LED 1 State: <span id="ledState">OFF</span></p>
    <button class="button active" id="button1" onclick="toggleLED(1)">Toggle LED 1</button>

    <p>LED 2 State: <span id="ledState2">OFF</span></p>
    <button class="button" id="button2" onclick="toggleLED(2)">Toggle LED 2</button>

    <p>LED 3 State: <span id="ledState3">OFF</span></p>
    <button class="button" id="button3" onclick="toggleLED(3)">Toggle LED 3</button>
    
    <p>LED 4 State: <span id="ledState4">OFF</span></p>
    <button class="button" id="button4" onclick="toggleLED(4)">Toggle LED 4</button>

    <script src="script.js"></script>
</body>
</html>
